version: '3.9'
services:
  api-rest:
    build: ./api-rest
    ports:
      - "8000:8000"
    environment:
      - LLM_API_URL=http://mock-model:8080
      - LLM_API_KEY=demo-key
    depends_on:
      - mock-model

  api-grpc:
    build: ./api-grpc
    ports:
      - "50051:50051"
    depends_on:
      - mock-model

  mock-model:
    image: python:3.11-slim
    command: python -m http.server 8080
    volumes:
      - ./tests/mock_model_response.json:/var/www/html/index.json:ro
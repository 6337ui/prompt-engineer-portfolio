name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r api-rest/requirements.txt
          pip install -r api-grpc/requirements.txt
          # Optional requirements for examples and evaluation harness
          if [ -f langchain-examples/requirements.txt ]; then pip install -r langchain-examples/requirements.txt; fi
          if [ -f trace-eval/requirements.txt ]; then pip install -r trace-eval/requirements.txt; fi
      - name: Lint and test
        run: |
          echo "Running tests..."
          pytest -q || true